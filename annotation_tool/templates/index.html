<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epistemic Reasoning Annotator</title>
  <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>

<!-- ── TOP BAR ─────────────────────────────────────────────── -->
<header id="topbar">
  <div id="topbar-left">
    <label id="btn-load-label" title="Load a .md case file from your computer">
      Load Case
      <input id="load-case-file" type="file" accept=".md,.txt" style="display:none">
    </label>
    <span id="case-name-display" class="case-name-display">No case loaded</span>
    <label>Annotator:
      <input id="annotator-input" type="text" placeholder="your name" autocomplete="off">
    </label>
  </div>
  <div id="topbar-right">
    <button id="btn-export">&#8595; Export JSON</button>
    <label id="btn-import-label">&#8593; Import JSON
      <input id="import-file" type="file" accept=".json" style="display:none">
    </label>
    <button id="btn-clear-compare" style="display:none">&#10005; Clear comparison</button>
  </div>
</header>

<!-- ── LABEL PALETTE ──────────────────────────────────────── -->
<div id="palette">
  <div class="palette-group">
    <span class="group-label">ABD</span>
    <button class="label-btn" data-label="1"  data-name="ABD_SELECTIVE"   data-tooltip="Identifying the best-fitting diagnosis from a pre-existing set of known disease candidates.">1 SEL</button>
    <button class="label-btn" data-label="2"  data-name="ABD_CREATIVE"    data-tooltip="Generating a genuinely novel hypothesis not previously in the clinician's repertoire, essential for rare or atypical presentations.">2 CRE</button>
    <button class="label-btn" data-label="3"  data-name="ABD_VISUAL"      data-tooltip="A perceptually driven form where direct sensory engagement with the patient — sight, touch, sound — triggers a hypothesis before any formal analytical step.">3 VIS</button>
    <button class="label-btn" data-label="4"  data-name="ABD_CAUSAL"      data-tooltip="Reasoning backward from an observed outcome or symptom cluster to identify the underlying pathophysiological mechanism that could produce it.">4 CAU</button>
  </div>
  <div class="palette-group">
    <span class="group-label">DED</span>
    <button class="label-btn" data-label="5"  data-name="DED_HYPOTHETICO" data-tooltip="The classical model: generate a hypothesis, deduce what findings must be present if true, then test that prediction against the patient's actual data.">5 HYP</button>
    <button class="label-btn" data-label="6"  data-name="DED_ALGORITHMIC"  data-tooltip="Applying a pre-determined, codified clinical decision rule or evidence-based guideline mechanically to patient data to yield a structured conclusion.">6 ALG</button>
    <button class="label-btn" data-label="7"  data-name="DED_HIERARCHICAL" data-tooltip="Organizing competing diagnoses by clinical priority — life-threatening first, then most common — and systematically excluding them in order of urgency.">7 HIE</button>
    <button class="label-btn" data-label="8"  data-name="DED_VALIDATION"   data-tooltip="A structured retrospective check in which the clinician re-examines whether the tentative diagnosis remains coherent with all gathered data, including any previously overlooked findings.">8 VAL</button>
  </div>
  <div class="palette-group">
    <span class="group-label">IND</span>
    <button class="label-btn" data-label="9"  data-name="IND_PATTERN"     data-tooltip="Rapid, automatic retrieval of a stored illness script or clinical prototype triggered by a matching symptom constellation; dominant in expert, familiar cases.">9 PAT</button>
    <button class="label-btn" data-label="10" data-name="IND_INTUITION"   data-tooltip="An affective, pre-analytic signal of concern or urgency that arises before formal reasoning; more prognostic than diagnostic, often prompting deeper investigation despite reassuring data.">10 INT</button>
    <button class="label-btn" data-label="11" data-name="IND_BAYESIAN"    data-tooltip="Formal probabilistic reasoning that quantitatively updates the prior probability of a disease using new evidence — test results, signs, or epidemiological data.">11 BAY</button>
    <button class="label-btn" data-label="12" data-name="IND_CASEBASED"   data-tooltip="Retrieval of one or more prior clinical cases analogous to the current patient, followed by adaptation of that case's resolution to the new context; used by both human experts and AI systems.">12 CAS</button>
  </div>
  <div id="active-label-display">No label selected</div>
</div>

<!-- ── WARNING BAR ──────────────────────────────────────────── -->
<div id="warning-bar" style="display:none"></div>

<!-- ── MAIN PANELS ─────────────────────────────────────────── -->
<div id="main">

  <!-- LEFT: document -->
  <div id="doc-panel">
    <div id="doc-placeholder">Load a case file and enter your annotator name to begin.</div>
    <div id="doc" tabindex="0"></div>
  </div>

  <!-- RIGHT: annotations -->
  <div id="annotation-panel">
    <div id="stats-bar"></div>
    <div id="annotation-list"></div>
    <details id="json-preview-details">
      <summary>JSON preview</summary>
      <pre id="json-preview"></pre>
    </details>
  </div>

</div>

<!-- ── SPAN POPUP ───────────────────────────────────────────── -->
<div id="span-popup" style="display:none">
  <span id="popup-label-name"></span>
  <button id="popup-delete">Delete &#10005;</button>
</div>

<script src="/static/app.js?v=5"></script>
</body>
</html>
